apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: heartai-api-hpa
  namespace: heartai
  labels:
    app.kubernetes.io/name: heartai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: heartai-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
