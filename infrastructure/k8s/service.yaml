apiVersion: v1
kind: Service
metadata:
  name: heartai-api
  namespace: heartai
  labels:
    app.kubernetes.io/name: heartai
    app.kubernetes.io/component: api
spec:
  selector:
    app: heartai-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
